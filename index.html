<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Jayden-X-L</title>
    <meta name="description" content="Jayden-X-L project index.">
    <style>
      :root {
        color-scheme: light;
        --ink: #101828;
        --muted: #475467;
        --line: #d0d5dd;
        --page: #f8fafc;
        --card: #ffffff;
        --accent: #2563eb;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: var(--ink);
        background: var(--page);
      }

      main {
        width: min(880px, calc(100% - 32px));
        margin: 0 auto;
        padding: 72px 0;
      }

      h1 {
        margin: 0 0 12px;
        font-size: 44px;
        line-height: 1.1;
        letter-spacing: 0;
      }

      p {
        margin: 0 0 28px;
        color: var(--muted);
        font-size: 18px;
        line-height: 1.7;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
        gap: 16px;
      }

      a {
        display: block;
        min-height: 132px;
        padding: 22px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--card);
        color: inherit;
        text-decoration: none;
        box-shadow: 0 14px 34px rgba(16, 24, 40, 0.08);
      }

      a:hover {
        border-color: var(--accent);
      }

      strong {
        display: block;
        margin-bottom: 8px;
        font-size: 20px;
      }

      span {
        color: var(--muted);
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Jayden-X-L</h1>
      <p>Project index. MeowFinder now lives on its own GitHub Pages repository and custom domain.</p>
      <div class="grid">
        <a href="https://jayden-x-l.github.io/forkprobe/">
          <strong>ForkProbe</strong>
          <span>AI Skill 选型与试跑工具。</span>
        </a>
        <a href="https://www.meowfinder.com/">
          <strong>MeowFinder</strong>
          <span>Find a hiding cat with familiar sounds and hiding spot guides.</span>
        </a>
      </div>
    </main>
  </body>
</html>
